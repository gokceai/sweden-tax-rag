services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sweden-tax-api
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - DYNAMO_ENDPOINT=http://dynamodb-local:8000
    depends_on:
      - dynamodb-local
      - chromadb

  dynamodb-local:
    image: "amazon/dynamodb-local:latest"
    container_name: sweden-tax-dynamo
    ports:
      - "8000:8000"
    volumes:
      - "./docker/dynamodb_data:/home/dynamodblocal/data"
    working_dir: /home/dynamodblocal
    command: "-jar DynamoDBLocal.jar -sharedDb -dbPath ./data"

  chromadb:
    image: chromadb/chroma:latest
    container_name: sweden-tax-chroma
    ports:
      - "8001:8000"
    volumes:
      - "./docker/chroma_data:/data"
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
