services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sweden-tax-api
    restart: unless-stopped
    ports:
      - "8080:7860"
    env_file:
      - .env
    environment:
      - CHROMA_PERSIST_DIR=/app/docker/chroma_data
      - SQLITE_DB_PATH=/app/docker/documents.db
      - LLM_MODEL_PATH=${LLM_MODEL_PATH_IN_CONTAINER:-${LLM_MODEL_PATH}}
      # Local docker-compose: API and UI share port 7860 inside container,
      # exposed as 8080 on the host. API_BASE_URL points back to the same port.
      - API_BASE_URL=http://localhost:7860/api/v1
    volumes:
      - ./docker:/app/docker
      - ${LLM_MODEL_HOST_PATH:-./docker/llm_models}:${LLM_MODEL_CONTAINER_ROOT:-/models}:ro
    cpus: ${API_CPUS_LIMIT:-4.0}
    mem_limit: ${API_MEM_LIMIT:-10g}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7860/health/live').read()"]
      interval: 30s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    container_name: sweden-tax-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    cpus: ${PROMETHEUS_CPUS_LIMIT:-1.0}
    mem_limit: ${PROMETHEUS_MEM_LIMIT:-768m}
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    depends_on:
      - api
      - alertmanager
    profiles:
      - monitoring

  alertmanager:
    image: prom/alertmanager:latest
    container_name: sweden-tax-alertmanager
    restart: unless-stopped
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
    ports:
      - "9093:9093"
    cpus: ${ALERTMANAGER_CPUS_LIMIT:-0.5}
    mem_limit: ${ALERTMANAGER_MEM_LIMIT:-256m}
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: sweden-tax-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    cpus: ${GRAFANA_CPUS_LIMIT:-1.0}
    mem_limit: ${GRAFANA_MEM_LIMIT:-768m}
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-change-me-before-production}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    profiles:
      - monitoring

  dcgm-exporter:
    image: nvidia/dcgm-exporter:latest
    container_name: sweden-tax-dcgm-exporter
    restart: unless-stopped
    gpus: all
    ports:
      - "9400:9400"
    cap_add:
      - SYS_ADMIN
    profiles:
      - gpu-monitoring
