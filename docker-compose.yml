services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sweden-tax-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - DYNAMO_ENDPOINT=http://dynamodb-local:8000
    depends_on:
      - dynamodb-local
      - chromadb
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/').read()"]
      interval: 30s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sweden-tax-frontend
    restart: unless-stopped
    command: streamlit run src/frontend/app.py --server.address 0.0.0.0 --server.port 8501
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - API_BASE_URL=http://api:8080/api/v1
    depends_on:
      - api
    profiles:
      - ui
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/').read()"]
      interval: 30s
      timeout: 5s
      retries: 5

  dynamodb-local:
    image: "amazon/dynamodb-local:latest"
    container_name: sweden-tax-dynamo
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - "./docker/dynamodb_data:/home/dynamodblocal/data"
    working_dir: /home/dynamodblocal
    command: "-jar DynamoDBLocal.jar -sharedDb -dbPath ./data"

  chromadb:
    image: chromadb/chroma:latest
    container_name: sweden-tax-chroma
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - "./docker/chroma_data:/data"
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE

  prometheus:
    image: prom/prometheus:latest
    container_name: sweden-tax-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    depends_on:
      - api
      - alertmanager
    profiles:
      - monitoring

  alertmanager:
    image: prom/alertmanager:latest
    container_name: sweden-tax-alertmanager
    restart: unless-stopped
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: sweden-tax-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    profiles:
      - monitoring

  dcgm-exporter:
    image: nvidia/dcgm-exporter:latest
    container_name: sweden-tax-dcgm-exporter
    restart: unless-stopped
    gpus: all
    ports:
      - "9400:9400"
    cap_add:
      - SYS_ADMIN
    profiles:
      - monitoring
      - gpu-monitoring
