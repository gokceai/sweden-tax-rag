services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.gpu
    ports:
      - "8080:8080"
    environment:
      - API_PORT=8080
      - API_BASE_URL=http://localhost:8080/api/v1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
