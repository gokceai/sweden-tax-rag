name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
          pip install ruff

      - name: Lint (syntax and undefined-name gate)
        run: |
          ruff check . --select E9,F63,F7,F82 --target-version py312

      - name: Validate Prometheus config and rules
        run: |
          docker run --rm -v "${{ github.workspace }}/monitoring/prometheus:/etc/prometheus:ro" prom/prometheus:latest promtool check config /etc/prometheus/prometheus.yml
          docker run --rm -v "${{ github.workspace }}/monitoring/prometheus:/etc/prometheus:ro" prom/prometheus:latest promtool check rules /etc/prometheus/alerts.yml

      - name: Import smoke
        run: |
          python - <<'PY'
          import importlib

          modules = [
              "src.api.main",
              "src.api.schemas",
              "src.core.config",
              "src.core.dependencies",
              "src.engine.rag_core",
              "src.db.chroma_client",
              "src.db.sqlite_document_repo",
              "src.frontend.app",
          ]
          for name in modules:
              importlib.import_module(name)
          print("Import smoke passed.")
          PY

      - name: Run tests
        run: pytest -q -m "not integration"

      - name: Monitoring smoke tests
        run: pytest -q tests/test_api.py -k "metrics or health"

  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Run integration tests
        env:
          MASTER_ENCRYPTION_KEY: MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2Nzg5MDE=
          CHROMA_PERSIST_DIR: /tmp/test_chroma
          SQLITE_DB_PATH: /tmp/test_documents.db
        run: pytest -q -m integration

  compose-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Copy env
        run: |
          cp .env.example .env
          KEY=$(python -c "import base64, os; print(base64.urlsafe_b64encode(os.urandom(32)).decode())")
          echo "MASTER_ENCRYPTION_KEY=${KEY}" >> .env

      - name: Start API (CPU mode)
        run: docker compose up -d api

      - name: Wait for health/ready
        run: |
          for i in $(seq 1 20); do
            curl -sf http://localhost:8080/health/ready && echo "ready" && exit 0
            sleep 3
          done
          echo "Timed out"
          docker compose logs api
          exit 1

      - name: Teardown
        if: always()
        run: docker compose down
