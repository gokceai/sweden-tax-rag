name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
          pip install ruff

      - name: Lint (syntax and undefined-name gate)
        run: |
          ruff check . --select E9,F63,F7,F82 --target-version py312

      - name: Import smoke
        run: |
          python - <<'PY'
          import importlib

          modules = [
              "src.api.main",
              "src.api.schemas",
              "src.core.config",
              "src.core.dependencies",
              "src.engine.rag_core",
              "src.db.chroma_client",
              "src.db.document_repo",
              "src.db.dynamo_client",
              "src.frontend.app",
          ]
          for name in modules:
              importlib.import_module(name)
          print("Import smoke passed.")
          PY

      - name: Run tests
        run: pytest -q -m "not integration"
