name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
          pip install ruff

      - name: Lint (syntax and undefined-name gate)
        run: |
          ruff check . --select E9,F63,F7,F82 --target-version py312

      - name: Import smoke
        run: |
          python - <<'PY'
          import importlib

          modules = [
              "src.api.main",
              "src.api.schemas",
              "src.core.config",
              "src.core.dependencies",
              "src.engine.rag_core",
              "src.db.chroma_client",
              "src.db.document_repo",
              "src.db.dynamo_client",
              "src.frontend.app",
          ]
          for name in modules:
              importlib.import_module(name)
          print("Import smoke passed.")
          PY

      - name: Run tests
        run: pytest -q -m "not integration"

  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.event_name == 'workflow_dispatch'

    services:
      dynamodb:
        image: amazon/dynamodb-local:latest
        ports:
          - 8000:8000
        options: >-
          --health-cmd "wget -qO- http://localhost:8000/shell/ || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20
      chroma:
        image: chromadb/chroma:latest
        ports:
          - 8001:8000
        env:
          IS_PERSISTENT: "FALSE"
          ANONYMIZED_TELEMETRY: "FALSE"
        options: >-
          --health-cmd "wget -qO- http://localhost:8000/api/v2/heartbeat || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Run integration tests
        env:
          MASTER_ENCRYPTION_KEY: MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2Nzg5MDE=
          CHROMA_HOST: localhost
          CHROMA_PORT: 8001
          DYNAMO_ENDPOINT: http://localhost:8000
        run: pytest -q -m integration
