global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: sweden-tax-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8080"]

  - job_name: dcgm-exporter
    metrics_path: /metrics
    static_configs:
      - targets: ["dcgm-exporter:9400"]
