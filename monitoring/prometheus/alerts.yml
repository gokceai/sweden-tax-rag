groups:
  - name: sweden_tax_rag_alerts
    rules:
      - alert: HighApi5xxRate
        expr: |
          (
            sum(rate(http_requests_total{path!="/metrics", status_code=~"5.."}[5m]))
            /
            sum(rate(http_requests_total{path!="/metrics"}[5m]))
          ) * 100 > 1
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "API 5xx rate exceeded target"
          description: "5xx error rate is above 1% for 10 minutes."

      - alert: HighApiP95Latency
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(http_request_duration_seconds_bucket{path!="/metrics"}[5m])) by (le)
          ) > 2.5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "API p95 latency exceeded target"
          description: "p95 latency is above 2.5 seconds for 10 minutes."

      - alert: GpuExporterDown
        expr: up{job="dcgm-exporter"} == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "GPU exporter is down"
          description: "dcgm-exporter is not reachable by Prometheus for 5 minutes."
